# fly.toml app configuration file generated for beet-scheduler on 2026-02-27T10:56:06+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'beet-scheduler'
primary_region = 'arn'

[mount]
  source = 'bsdata'
  destination = '/data'

[build]

[env]
  #PORT = '8080'
  DATABASE_PATH = '/data/beet-scheduler.db'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
